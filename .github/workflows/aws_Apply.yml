#Untuk workflow deploy infras menggunakan terraform untuk AWS , pada github action
#kita perlu membuat dahulu TF_plan worklownya dalam bentuk "reusable workflow"
name: "Build_TF_Apply"
on:
  workflow_call:
    #disini kita perlu tentukan apa saja yg menjadi input yg nantinya
    # sama sperti workflow tf_plan
    inputs:
      path:
        description: "path terraform module"
        required: true
        type: string
      tf_version:
        description: "species version terraform"
        required: true
        type: string 
        default: latest
      gh_environtment:
        description: "disini tempat kita define multi-envi deployment"
        required: true
        type: string
        default: null      
      tf_vars_file:
        description: "disiini tempat kita define variable value untuk module terrafomr"
        required: true
        type: string
jobs:
  apply-plan:
    runs-on: ubuntu-latest
    
  
